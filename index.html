<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Blitz Pro V2.1</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; align-items: center; justify-content: flex-start; }
        .hidden { display: none !important; }

        .version-tag { font-size: 0.7rem; color: #475569; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- HISTORY SECTION --- */
        #setup-screen h1 { font-size: 3rem; margin: 10px 0 20px; color: var(--accent); font-weight: 900; }
        
        .history-container {
            width: 100%;
            max-width: 380px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #334155;
        }

        .history-header { display: flex; justify-content: space-between; padding: 5px 10px; font-weight: bold; font-size: 0.75rem; color: #64748b; border-bottom: 1px solid #334155; }
        #history-list { max-height: 160px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #1e293b; font-size: 1rem; }

        /* --- GAME UI --- */
        #timer-bar { position: fixed; top: 0; left: 0; height: 10px; background: var(--accent); width: 100%; z-index: 100; box-shadow: 0 0 15px var(--accent); }
        
        .flash-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            margin: 40px 0 20px 0;
            border: 1px solid #334155;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #equation { font-size: 5rem; font-weight: 900; margin: 0; color: #fff; }
        #answer-display { font-size: 4rem; height: 80px; color: var(--accent); font-weight: bold; margin-top: 5px; }

        /* --- KEYBOARD (FIXED) --- */
        .keyboard { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 400px; 
            margin-top: auto;
            margin-bottom: 80px; 
        }
        
        .key { 
            background: #334155; 
            height: 75px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 18px; 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #fff;
            border-bottom: 5px solid #0f172a;
            cursor: pointer;
        }
        
        .key:active { background: #475569; border-bottom-width: 1px; transform: translateY(4px); }
        .key.del { color: var(--danger); font-size: 1.1rem; text-transform: uppercase; }

        .mode-btn {
            width: 100%; max-width: 340px; padding: 20px; margin: 6px 0;
            background: #1e293b; color: white; border: 1px solid #334155;
            border-radius: 18px; font-size: 1.2rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <div class="version-tag">Build 2.1 • Auto-Check Active</div>
        <h1>Math Blitz</h1>
        <button class="mode-btn" onclick="startGame(10, 'Relaxed')">🐢 Relaxed (10s)</button>
        <button class="mode-btn" onclick="startGame(5, 'Standard')">⚡ Standard (5s)</button>
        <button class="mode-btn" onclick="startGame(3, 'Insane')">🔥 Insane (3s)</button>

        <div class="history-container">
            <div class="history-header"><span>MODE</span><span>SCORE</span><span>DATE</span></div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="timer-bar"></div>
        <div class="flash-card">
            <div id="equation">? × ?</div>
            <div id="answer-display">_</div>
        </div>
        <div class="keyboard">
            <div class="key" onclick="tap('1')">1</div>
            <div class="key" onclick="tap('2')">2</div>
            <div class="key" onclick="tap('3')">3</div>
            <div class="key" onclick="tap('4')">4</div>
            <div class="key" onclick="tap('5')">5</div>
            <div class="key" onclick="tap('6')">6</div>
            <div class="key" onclick="tap('7')">7</div>
            <div class="key" onclick="tap('8')">8</div>
            <div class="key" onclick="tap('9')">9</div>
            <div class="key del" onclick="tap('C')">Clear</div>
            <div class="key" onclick="tap('0')">0</div>
        </div>
    </div>

    <script>
        let deck = [], curIdx = 0, input = "", timeLimit = 5, modeName = "Standard";
        let timer, score = 0;
        let historyData = JSON.parse(localStorage.getItem('mathHistory')) || [];

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            if (!list) return;
            list.innerHTML = historyData.length === 0 ? '<div style="text-align:center; padding:20px; color:#475569;">No attempts yet</div>' : '';
            historyData.slice().reverse().slice(0, 10).forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${item.mode}</span><b>${item.score}</b><span style="color:#64748b">${item.date}</span>`;
                list.appendChild(div);
            });
        }

        function makeDeck() {
            let d = [];
            for(let i=1; i<=9; i++) {
                for(let j=1; j<=9; j++) d.push({n1:i, n2:j, a:i*j});
            }
            return d.sort(() => Math.random() - 0.5);
        }

        function startGame(s, label) {
            timeLimit = s; modeName = label; score = 0;
            deck = makeDeck(); curIdx = 0;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            ask();
        }

        function ask() {
            if(curIdx >= deck.length) { deck = makeDeck(); curIdx = 0; }
            input = "";
            document.getElementById('answer-display').innerText = "";
            document.getElementById('equation').innerText = `${deck[curIdx].n1} × ${deck[curIdx].n2}`;
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            let start = Date.now();
            timer = setInterval(() => {
                let rem = (timeLimit * 1000) - (Date.now() - start);
                bar.style.width = (rem / (timeLimit * 1000) * 100) + "%";
                if(rem <= 0) end();
            }, 30);
        }

        function tap(k) {
            if(k === 'C') {
                input = "";
                document.getElementById('answer-display').innerText = "";
                return;
            }
            if (input.length < 2) {
                input += k;
                document.getElementById('answer-display').innerText = input;
            }
            if (parseInt(input) === deck[curIdx].a) {
                score++;
                curIdx++;
                ask();
            }
        }

        function end() {
            clearInterval(timer);
            const correctAns = deck[curIdx].a;
            const now = new Date();
            const dateStr = (now.getMonth()+1) + "/" + now.getDate();
            historyData.push({ mode: modeName, score: score, date: dateStr });
            localStorage.setItem('mathHistory', JSON.stringify(historyData));
            alert(`TIME'S UP!\nAnswer was: ${correctAns}\nScore: ${score}`);
            updateHistoryUI();
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }

        updateHistoryUI();
    </script>
</body>
</html>
